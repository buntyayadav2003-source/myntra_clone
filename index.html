        <div class="carousel-item">

    <img src="./assets/bobcard-logo.png" alt="BOB Card" style="height: 40px;">
    <img src="./assets/HSBC-Logo.png" alt="HSBC" style="height: 40px;">
    <img src="./assets/sbi log.png" alt="SBI" style="height: 40px;">
    <h3 class="fs-5 mb-0 fw-semibold">10% instant discount*</h3>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
